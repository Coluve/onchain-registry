<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">On-Chain Registry research workspace preview</title>
  <desc id="desc">Illustrated market research workspace with watchlist rows, comparison cards, learning notes, and a risk disclosure panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset=".55" stop-color="#eef4f8"/>
      <stop offset="1" stop-color="#f7f0df"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17202b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17202b" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="920" height="620" rx="34" fill="url(#bg)"/>
  <g opacity=".38" stroke="#c7d2dd" stroke-width="2">
    <path d="M72 114h776M72 196h776M72 278h776M72 360h776M72 442h776"/>
    <path d="M176 70v472M304 70v472M432 70v472M560 70v472M688 70v472"/>
  </g>
