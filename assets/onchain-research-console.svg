      <text x="162" y="38" font-family="Inter, Arial, sans-serif" font-size="15" fill="#667085">Market caps, themes, education</text>
      <path d="M365 42h54" stroke="#8f7b4f" stroke-width="8" stroke-linecap="round"/>
    </g>
