<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 660" role="img" aria-labelledby="title desc">
  <title id="title">Deferred review gate</title>
  <desc id="desc">An abstract review-gate diagram with a paused concept card, muted ledger panels, and no active product functionality.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".58" stop-color="#eff1f2"/>
      <stop offset="1" stop-color="#f7f7f4"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#202631"/>
      <stop offset="1" stop-color="#596170"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#202631" flood-opacity=".15"/>
    </filter>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0H0v58" fill="none" stroke="#e1e5e8" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="860" height="660" rx="28" fill="url(#bg)"/>
  <rect x="32" y="32" width="796" height="596" rx="24" fill="url(#grid)" opacity=".72"/>

  <g filter="url(#shadow)">
    <rect x="64" y="72" width="260" height="210" rx="22" fill="#fff"/>
    <text x="94" y="118" fill="#202631" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850">Concept status</text>
    <text x="94" y="150" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="15">Exploratory and deferred</text>
    <rect x="94" y="182" width="170" height="18" rx="9" fill="#e1e5e8"/>
    <rect x="94" y="216" width="122" height="18" rx="9" fill="#e1e5e8"/>
    <rect x="94" y="248" width="190" height="12" rx="6" fill="#8f7b4f" opacity=".45"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="536" y="72" width="260" height="210" rx="22" fill="#fff"/>
    <text x="566" y="118" fill="#202631" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850">Public posture</text>
    <text x="566" y="150" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="15">Informational only</text>
    <g fill="none" stroke="#8f7b4f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="m566 196 8 8 17-20"/>
      <path d="m566 232 8 8 17-20"/>
    </g>
    <text x="608" y="202" fill="#202631" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="750">No onboarding</text>
    <text x="608" y="238" fill="#202631" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="750">No functionality</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="430" cy="334" r="146" fill="url(#dark)"/>
    <circle cx="430" cy="334" r="108" fill="none" stroke="#ffffff" stroke-width="2" opacity=".26"/>
    <circle cx="430" cy="334" r="72" fill="none" stroke="#ffffff" stroke-width="2" opacity=".22"/>
    <rect x="337" y="286" width="186" height="96" rx="18" fill="#fff"/>
    <text x="430" y="326" text-anchor="middle" fill="#202631" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">Paused</text>
    <text x="430" y="356" text-anchor="middle" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="15">Review required first</text>
  </g>

  <path d="M326 178c66 16 86 54 94 108" fill="none" stroke="#8f7b4f" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12"/>
  <path d="M536 178c-66 16-86 54-94 108" fill="none" stroke="#8f7b4f" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12"/>

  <g filter="url(#shadow)">
    <rect x="90" y="468" width="680" height="118" rx="22" fill="#fff"/>
    <text x="122" y="514" fill="#202631" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850">Review gate before any future waypoint</text>
    <text x="122" y="548" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="16">Approval, qualified review, clear use case, and documented constraints must come first.</text>
    <rect x="632" y="506" width="92" height="28" rx="14" fill="#eff1f2"/>
    <text x="678" y="525" text-anchor="middle" fill="#596170" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">DEFERRED</text>
  </g>
</svg>
